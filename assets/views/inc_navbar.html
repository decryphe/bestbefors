<nav class="navbar bg-body-tertiary mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <img
                src="/static/logo.svg"
                width="64"
                alt="{{ t(key='gui-common-logo_alt', lang=lang_code) }}"
            />
        </a>

        <ul class="nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="/">
                    {{ t(key="gui-nav-dashboard", lang=lang_code) }}
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/inventory/list">
                    {{ t(key="gui-nav-inventory", lang=lang_code) }}
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/manage">
                    {{ t(key="gui-nav-manage", lang=lang_code) }}
                </a>
            </li>
        </ul>

        <div class="d-flex align-items-center gap-3">
            <form
                class="d-flex align-items-center gap-2"
                role="search"
                method="get"
                action="/inventory/list"
            >
                <input
                    class="form-control form-control-sm"
                    type="search"
                    placeholder="{{ t(key='gui-nav-search_placeholder', lang=lang_code) }}"
                    name="q"
                    value="{{ inventory_search | default(value='') }}"
                    aria-label="{{ t(key='gui-nav-search_aria', lang=lang_code) }}"
                />
            </form>
            <a class="nav-item">
                <img src="/static/flags/gb.svg" width="32" />
            </a>
            <div class="d-flex align-items-center gap-2">
                <a
                    id="navbar-login"
                    class="btn btn-outline-primary btn-sm"
                    href="/auth/login"
                >
                    {{ t(key="gui-nav-login", lang=lang_code) }}
                </a>
                <a
                    id="navbar-logout"
                    class="btn btn-outline-secondary btn-sm d-none"
                    href="/auth/logout"
                >
                    {{ t(key="gui-nav-logout", lang=lang_code) }}
                </a>
            </div>
        </div>
    </div>
</nav>
<script>
    (function () {
        const loginLink = document.getElementById("navbar-login");
        const logoutLink = document.getElementById("navbar-logout");
        if (!loginLink || !logoutLink) {
            return;
        }

        function syncAuthLinks() {
            const hasToken = Boolean(localStorage.getItem("auth_token"));
            loginLink.classList.toggle("d-none", hasToken);
            logoutLink.classList.toggle("d-none", !hasToken);
        }

        syncAuthLinks();
        window.addEventListener("storage", (event) => {
            if (event.key === "auth_token") {
                syncAuthLinks();
            }
        });
    })();
</script>
